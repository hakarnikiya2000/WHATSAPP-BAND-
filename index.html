<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOD OF SERVER · WhatsApp BAN · enter number</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #030503;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      position: relative;
      overflow-x: hidden;
      color: #b0ffb0;
    }

    /* LIVE HACKING CANVAS (matrix rain + glitch) */
    #hackingCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }

    /* MAIN TERMINAL PANEL */
    .god-panel {
      position: relative;
      z-index: 20;
      max-width: 820px;
      width: 100%;
      background: rgba(8, 18, 8, 0.85);
      backdrop-filter: blur(6px);
      border: 2px solid #3aff96;
      box-shadow: 0 0 35px #00ff73, 0 0 20px #1eff6e inset;
      border-radius: 42px;
      padding: 2.5rem 2.2rem;
      text-align: center;
    }

    .god-title {
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: 7px;
      text-transform: uppercase;
      text-shadow: -4px -3px 0 #00fa7a, 5px 4px 0 #0022ff;
      animation: glitchText 2.2s infinite steps(1);
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }

    @keyframes glitchText {
      0%, 100% { transform: skew(0deg, 0deg); text-shadow: -4px -3px 0 #0f0, 5px 4px 0 #00a2ff; }
      95% { transform: skew(2deg, 0.8deg); text-shadow: -7px -2px 0 cyan, 6px 3px 0 magenta; }
      96% { transform: skew(-4deg, -1deg); text-shadow: 8px 4px 0 #ff00b3, -5px -5px 0 #33ff33; }
      97% { transform: skew(0deg, 0deg); }
    }

    .subhead {
      color: #b7ffc0;
      font-size: 1.2rem;
      border-bottom: 2px dashed #22ff88;
      padding-bottom: 0.7rem;
      margin-bottom: 1.8rem;
      word-spacing: 5px;
    }

    /* LOGIN BOX (password) */
    .login-area {
      background: #0a1a0a;
      border: 1px solid #33ee77;
      border-radius: 60px;
      padding: 1rem 1.8rem;
      margin: 1rem 0 2rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 0 25px #44ff99;
    }

    .login-label {
      font-size: 1.8rem;
      color: #b2ffb2;
    }

    .password-field {
      background: #030b03;
      padding: 0.7rem 2rem;
      border-radius: 60px;
      border: 2px solid #28fa7c;
      font-size: 2.2rem;
      color: #ffffff;
      letter-spacing: 5px;
      text-shadow: 0 0 8px #0f0;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .password-field:hover {
      background: #142014;
      box-shadow: 0 0 30px #53ff9f;
    }

    .password-field i {
      font-size: 1.8rem;
    }

    /* ENTER NUMBER SECTION */
    .ban-input-section {
      background: #0c1c10;
      border-radius: 80px;
      padding: 2rem 2rem;
      border: 2px solid #1eff84;
      margin: 30px 0 25px;
    }

    .section-label {
      font-size: 1.9rem;
      color: #b3ffb3;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 5px;
    }

    .number-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #021002;
      padding: 1.4rem 1.8rem;
      border-radius: 60px;
      border: 1px solid #40ff80;
    }

    .prefix {
      font-size: 2rem;
      color: #acffac;
    }

    #targetNumber {
      background: #101010;
      border: 2px solid #2eff6e;
      padding: 1rem 1.8rem;
      border-radius: 60px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 2rem;
      color: #c8ffc8;
      width: 300px;
      max-width: 70vw;
      text-align: center;
      outline: none;
      box-shadow: 0 0 20px #0f0;
    }

    #targetNumber::placeholder {
      color: #3d754d;
      font-size: 1.3rem;
    }

    /* BAN BUTTON + RESULT */
    .ban-execute {
      margin: 30px 0 20px;
    }

    .ban-btn {
      background: #1e001e;
      border: 4px solid #ff4576;
      font-size: 2.8rem;
      padding: 1rem 3rem;
      border-radius: 70px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #ffb0b0;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 0 40px #ff386b;
      display: inline-flex;
      align-items: center;
      gap: 20px;
    }

    .ban-btn i {
      font-size: 2.8rem;
      color: #ff8383;
    }

    .ban-btn:hover {
      background: #410000;
      border-color: #ff0000;
      box-shadow: 0 0 70px #ff4d4d;
      transform: scale(1.03);
    }

    .result-area {
      background: #0b140b;
      border-radius: 40px;
      padding: 1.2rem 1.5rem;
      margin: 1.5rem 0 1.5rem;
      border: 2px solid #f55;
      color: #ffc1c1;
      font-size: 1.5rem;
      word-break: break-word;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CHANNEL LINK */
    .channel-container {
      margin-top: 2rem;
      border-top: 2px solid #17f576;
      padding-top: 1.8rem;
    }

    .whatsapp-link {
      display: inline-flex;
      background: #092009;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      border: 1px solid #2affa3;
      font-size: 1.8rem;
      color: #e2ffe2;
      text-decoration: none;
      align-items: center;
      gap: 20px;
      transition: 0.3s;
      box-shadow: 0 0 25px #2eff84;
    }

    .whatsapp-link i {
      font-size: 2.8rem;
      color: #25D366;
    }

    .whatsapp-link:hover {
      background: #174217;
      box-shadow: 0 0 45px #55ffaa;
      border-color: #ffffff;
      transform: translateY(-3px);
    }

    /* FOOTER STATUS */
    .status-footer {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      color: #73ffa0;
      font-size: 1.1rem;
      border-top: 1px solid #1d984a;
      padding-top: 1rem;
    }

    .blink-led {
      animation: blinker 1.2s step-end infinite;
    }

    @keyframes blinker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* responsive */
    @media (max-width: 600px) {
      .god-title { font-size: 2.3rem; }
      .password-field { font-size: 1.5rem; }
      .ban-btn { font-size: 2rem; padding: 0.8rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- live hacking canvas background -->
  <canvas id="hackingCanvas"></canvas>

  <!-- main interface panel -->
  <div class="god-panel">

    <div class="god-title">꧁ GOD OF SERVER ꧂</div>
    <div class="subhead">[ whatsapp permanent ban · number entry ]</div>

    <!-- login / password : NIKCY@BAND (copy) -->
    <div class="login-area">
      <span class="login-label"><i class="fas fa-lock"></i> LOGIN</span>
      <div class="password-field" onclick="copyPassword()">
        <span>NIKCY@BAND</span> <i class="fas fa-copy"></i>
      </div>
    </div>

    <!-- NUMBER INPUT FOR BAN -->
    <div class="ban-input-section">
      <div class="section-label">
        <i class="fas fa-dial"></i> ENTER TARGET NUMBER
      </div>
      <div class="number-input-wrapper">
        <span class="prefix">+91 ▸</span>
        <input type="text" id="targetNumber" placeholder="98xxx xxxxx" value="9876543210" maxlength="16">
      </div>
      <div style="margin-top: 10px; color: #70ff9a; font-size: 1.2rem;">[ include country code ]</div>
    </div>

    <!-- EXECUTE BAN BUTTON + RESULT DISPLAY -->
    <div class="ban-execute">
      <button class="ban-btn" id="banExecBtn" onclick="executeBan()">
        <i class="fas fa-gavel"></i> BAN NOW <i class="fas fa-skull-crossbones"></i>
      </button>
    </div>

    <!-- dynamic result shows banned number & permanent effect -->
    <div class="result-area" id="banResult">
      ⚡ awaiting target number ⚡
    </div>

    <!-- your whatsapp channel -->
    <div class="channel-container">
      <a href="https://whatsapp.com/channel/0029VbBp6cx5PO15V2fkip3C" target="_blank" class="whatsapp-link">
        <i class="fab fa-whatsapp"></i> JOIN GOD SERVER CHANNEL
        <i class="fas fa-arrow-up-right-from-square"></i>
      </a>
    </div>

    <!-- footer with live status animation -->
    <div class="status-footer">
      <span><i class="fas fa-circle" style="color:#33ff77;"></i> LIVE-HACK</span>
      <span class="blink-led">⏻ root@GODserver:~#</span>
      <span>⚡ BAN: PERMANENT</span>
    </div>
  </div>

  <script>
    // ================== LIVE HACKING CANVAS (matrix + glitch) ==================
    const canvas = document.getElementById('hackingCanvas');
    let ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const columns = Math.floor(canvas.width / 24); // column width
    const drops = [];
    for (let i = 0; i < columns; i++) {
      drops[i] = Math.floor(Math.random() * -canvas.height / 20);
    }

    const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF$#&%";

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#2eff6e';
      ctx.font = '20px "Share Tech Mono", monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        const x = i * 26;
        const y = drops[i] * 22;

        if (y > 0 && y < canvas.height) {
          ctx.fillText(text, x, y);
        }

        if (y > canvas.height && Math.random() < 0.98) {
          drops[i] = 0;
        } else {
          drops[i] += 0.4 + Math.random() * 0.9;
        }
      }

      // random glitch lines (rare)
      if (Math.random() < 0.08) {
        ctx.fillStyle = '#b8ffb8';
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 150, 2.2);
      }
      if (Math.random() < 0.03) {
        ctx.fillStyle = '#ffb0b0';
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 80, 3);
      }

      requestAnimationFrame(drawMatrix);
    }
    drawMatrix();

    // ================== COPY PASSWORD FUNCTION ==================
    function copyPassword() {
      const pwd = "NIKCY@BAND";
      navigator.clipboard.writeText(pwd).then(() => {
        alert('🔑 password NIKCY@BAND copied — god access granted');
      }).catch(() => {
        prompt('manual copy password:', pwd);
      });
    }

    // ================== BAN EXECUTION (enter number + permanent effect) ==================
    function executeBan() {
      const inputField = document.getElementById('targetNumber');
      let rawNumber = inputField.value.trim();

      // if empty, fallback to a default demo number
      if (rawNumber === '') {
        rawNumber = '+94 000000000';
      }

      // sanitize: keep only digits and optional '+'
      const cleaned = rawNumber.replace(/[^\d+]/g, '');
      const displayNumber = cleaned || 'unknown number';

      // get result div
      const resultDiv = document.getElementById('banResult');

      // visual feedback for button
      const btn = document.getElementById('banExecBtn');
      btn.style.background = '#3a0000';
      btn.style.borderColor = '#ff8888';
      btn.style.boxShadow = '0 0 90px #ff3737';
      setTimeout(() => {
        btn.style.background = '#1e001e';
        btn.style.borderColor = '#ff4576';
        btn.style.boxShadow = '0 0 40px #ff386b';
      }, 280);

      // create BAN message with random ban ID + permanent flag
      const banId = 'BAN-' + Math.floor(Math.random() * 90000 + 10000) + '-PERM';
      const timestamp = new Date().toLocaleTimeString();

      resultDiv.innerHTML = `
        <span style="color:#ff6666; font-size:1.8rem;">✖ PERMANENT BAN ✖</span><br>
        <span style="color:#f9b3b3;">number: ${displayNumber}</span><br>
        <span style="color:#aaffaa;">ID: ${banId}  |  ${timestamp}</span><br>
        <span style="color:#b3ffcf;">⚡ whatsapp server purged ⚡</span>
      `;

      // extra hacking effect: flash canvas red
      ctx.fillStyle = 'rgba(255, 60, 60, 0.25)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      setTimeout(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 120);

      // also simulate a live log in console (but who cares)
      console.log(`🔥 BAN EXECUTED on ${displayNumber} permanent`);
    }

    // extra: initial demo ban message
    window.addEventListener('load', () => {
      document.getElementById('banResult').innerHTML = '⏻ enter target number and press BAN';
    });

  </script>
</body>
</html>
